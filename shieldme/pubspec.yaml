name: shieldme
description: Application ShieldMe - Protection contre les arnaques MoMo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Networking
  http: ^1.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # State Management
  provider: ^6.0.5
  
  # Utilitaires
  intl: ^0.18.1
  pinput: ^3.0.1
  
  # Pour la gestion des URLs (optionnel)
  url_launcher: ^6.2.0
  
  # Pour les notifications (optionnel)
  # flutter_local_notifications: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^2.0.0
  
  # Pour les tests
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  
  # Assets (images, icônes, etc.)
  assets:
    - assets/images/
    - assets/icons/
  
